services:
  db:
    image: mysql:8
    container_name: mysql-franchise
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: franchise
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 10


  app:
    build: .
    container_name: franchise-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/franchise
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  db_data: